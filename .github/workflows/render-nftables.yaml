name: geoip2cn - Render nftables output

permissions:
  contents: write

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Initialize Python environment
        run: make init
      - name: Render nftables output
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          ALLOWED_IPS: ${{ vars.ALLOWED_IPS }}
          BLOCKED_IPS: ${{ vars.BLOCKED_IPS }}
          ASN_DENYLIST: ${{ vars.ASN_DENYLIST }}
          CITY_WHITELIST: ${{ vars.CITY_WHITELIST }}
          COUNTRY_CODES: ${{ vars.COUNTRY_CODES }}
        run: make run
      - name: Publish nftables.conf to download branch
        run: |
          set -euo pipefail
          cd outputs
          git init
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git checkout -B download
          git add .

          if git diff --cached --quiet; then
            echo "No output changes to publish"
            exit 0
          fi

          git commit -m "$(date +'%Y.%m.%d')"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin download
