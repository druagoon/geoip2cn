			223.215.240.0/20,
			223.240.0.0/18,
			223.240.192.0/18,
			223.242.224.0/19,
			223.244.64.0/18,
			223.245.128.0/17,
			223.246.0.0/17,
			223.248.0.0/14,
			223.255.236.0/22
		}
	}

	set allowed_ips {
		type ipv4_addr
		flags interval
		elements = {
			58.208.81.0/24
		}
	}

	set blocked_ips {
		type ipv4_addr
		flags interval
		elements = {
			180.167.0.0/16,
			180.169.0.0/16,
			210.13.64.0/18
		}
	}

	chain input {
		type filter hook input priority filter; policy drop;
		iifname "lo" accept
		ct state established,related accept
		ct state invalid drop
		ip protocol icmp accept

		# Explicit allowlist wins over all later drop rules.
		ip saddr @allowed_ips accept

		# Explicit block rules take precedence over GeoIP whitelist checks.
		ip saddr @blocked_ips drop
		ip saddr @geoip_blacklist_v4 drop

		# Only whitelist-matched sources may reach the SSH/HTTP service port rules below.
		ip saddr != @geoip_whitelist_v4 drop
		tcp dport { 22, 80, 443, 9922 } accept
	}

	chain forward {
		type filter hook forward priority filter; policy drop;
	}

	chain output {
		type filter hook output priority filter; policy accept;
	}
}
