table inet vps {
	set {{ geoip_blacklist_v4_name }} {
		type ipv4_addr
		flags interval
		{% if geoip_blacklist_v4_networks %}
		elements = {
			{{ geoip_blacklist_v4_networks | join(',\n\t\t\t') }}
		}
		{% endif %}
	}

	set {{ geoip_whitelist_v4_name }} {
		type ipv4_addr
		flags interval
		{% if geoip_whitelist_v4_networks %}
		elements = {
			{{ geoip_whitelist_v4_networks | join(',\n\t\t\t') }}
		}
		{% endif %}
	}

	set allowed_ips {
		type ipv4_addr
		flags interval
		{% if allowed_ips %}
		elements = {
			{{ allowed_ips | join(',\n\t\t\t') }}
		}
		{% endif %}
	}

	set blocked_ips {
		type ipv4_addr
		flags interval
		{% if blocked_ips %}
		elements = {
			{{ blocked_ips | join(',\n\t\t\t') }}
		}
		{% endif %}
	}

	chain input {
		type filter hook input priority filter; policy drop;
		iifname "lo" accept
		ct state established,related accept
		ct state invalid drop
		ip protocol icmp accept

		# Explicit allowlist wins over all later drop rules.
		ip saddr @allowed_ips accept

		# Explicit block rules take precedence over GeoIP whitelist checks.
		ip saddr @blocked_ips drop
		ip saddr @{{ geoip_blacklist_v4_name }} drop

		# Only whitelist-matched sources may reach the SSH/HTTP service port rules below.
		ip saddr != @{{ geoip_whitelist_v4_name }} drop
		tcp dport { 22, 80, 443, 9922 } accept
	}

	chain forward {
		type filter hook forward priority filter; policy drop;
	}

	chain output {
		type filter hook output priority filter; policy accept;
	}
}
